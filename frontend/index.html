<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISION — AI Smart Goggle Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>VISION AI Dashboard</h1>
            <div id="status-indicator" class="status offline">System Offline</div>
        </header>
        <div class="main-grid">
            <div class="panel" id="camera-panel">
                <h2>Live Feed</h2>
                <div class="feed-placeholder">Camera feed will appear here</div>
            </div>
            <div class="panel" id="detection-panel">
                <h2>Detections</h2>
                <ul id="detection-list"></ul>
            </div>
            <div class="panel" id="voice-panel">
                <h2>Voice Input</h2>
                <div id="transcript-box">Listening...</div>
            </div>
            <div class="panel" id="alert-panel">
                <h2>Alerts</h2>
                <div id="alert-box">No alerts</div>
            </div>
            <div class="panel" id="status-panel">
                <h2>System Status</h2>
                <div id="battery-status">Battery: --</div>
                <div id="cpu-status">CPU: --</div>
                <div id="model-status">Models: Loading...</div>
            </div>
            <div class="panel" id="scene-panel">
                <h2>Scene Description</h2>
                <div id="scene-box">Say "Describe" to get scene description</div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
